<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DevOps Project</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      background: #020617;
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h2 {
      color: #38bdf8;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
    }

    .hero {
      text-align: center;
      padding: 80px 20px;
    }

    .hero h1 {
      font-size: 40px;
      color: #38bdf8;
    }

    .hero p {
      color: #94a3b8;
      margin-top: 10px;
    }

    .hero img {
      width: 300px;
      margin-top: 30px;
      border-radius: 10px;
    }

    .features {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 40px;
      flex-wrap: wrap;
    }

    .card {
      background: #020617;
      padding: 20px;
      width: 250px;
      border-radius: 10px;
      text-align: center;
    }

    .card img {
      width: 100%;
      border-radius: 8px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #020617;
      margin-top: 40px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <header>
    <h2>DevOps App</h2>
    <nav>
      <a href="#">Home</a>
      <a href="#">Services</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <h1>🚀 Welcome to DevOps Project</h1>
    <p>CI/CD • Docker • AWS • Automation</p>
    <img src="https://picsum.photos/400/250" alt="hero image">
  </section>

  <section class="features">
    <div class="card">
      <img src="https://picsum.photos/300/200?1">
      <h3>Docker</h3>
      <p>Containerized applications بسهولة</p>
    </div>

    <div class="card">
      <img src="https://picsum.photos/300/200?2">
      <h3>AWS</h3>
      <p>Deploy على cloud بكل سهولة</p>
    </div>

    <div class="card">
      <img src="https://picsum.photos/300/200?3">
      <h3>CI/CD</h3>
      <p>Automation كامل للـ pipeline</p>
    </div>
  </section>

  <footer>
    <p>© 2026 DevOps Project | Built by You 💪</p>
  </footer>

</body>
</html>
